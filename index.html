  <body>
    <div id="left">
      <img
        id="letter-ㄱ"
        class="vinyl-art"
        src="letters/ㄱ-01.svg"
        alt="ㄱ"
        draggable="false"
      />
    </div>
    <script>
      ;(() => {
        const img = document.getElementById("letter-ㄱ")
        const frameCount = 10
        const frameDurationMs = 150

        const frames = Array.from({ length: frameCount }, (_, i) => {
          const padded = String(i + 1).padStart(2, "0")
          return `letters/ㄱ-${padded}.svg`
        })

        // Preload so swaps don't flash
        frames.forEach((src) => {
          const pre = new Image()
          pre.src = src
        })

        let frame = 0
        setInterval(() => {
          frame = (frame + 1) % frameCount
          img.src = frames[frame]
        }, frameDurationMs)
      })()
    </script>
